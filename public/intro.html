<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Health Twin</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020617;font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#cv{position:fixed;inset:0;z-index:0}
#cv canvas{display:block;width:100%!important;height:100%!important}

/* Eyes */
#eyes{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 2s ease}
#eyes.on{opacity:1}
#eyes-inner{display:flex;align-items:center;gap:110px;transition:transform .12s ease-out}
.eye{width:38px;height:38px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,1) 0%,rgba(0,229,255,.65) 28%,rgba(0,229,255,.2) 60%,rgba(0,229,255,0) 80%);box-shadow:0 0 12px 4px rgba(0,229,255,.5),0 0 32px 12px rgba(0,229,255,.2),0 0 70px 24px rgba(0,229,255,.07);animation:ebreathe 3s ease-in-out infinite}
.eye:nth-child(2){animation-delay:.18s}
@keyframes ebreathe{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}

/* UI */
#ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;padding-top:160px;pointer-events:none}
#ui.on{pointer-events:auto}
.u{opacity:0;transform:translateY(16px)}
#ui.on .u{opacity:1;transform:translateY(0)}
.lbl{font-size:.68rem;font-weight:700;letter-spacing:.38em;text-transform:uppercase;color:#00e5ff;transition:opacity .85s ease .1s,transform .85s ease .1s}
.ttl{margin-top:1.1rem;font-size:clamp(2.6rem,5.5vw,5rem);font-weight:800;line-height:1.08;letter-spacing:-.02em;transition:opacity .9s ease .3s,transform .9s ease .3s}
.ttl .w{color:#fff}.ttl .c{color:#00e5ff}
.sub{margin-top:1.3rem;font-size:1rem;line-height:1.75;color:rgba(255,255,255,.5);max-width:620px;transition:opacity .85s ease .52s,transform .85s ease .52s}
.cta{margin-top:2.3rem;display:flex;align-items:center;gap:1rem;transition:opacity .85s ease .72s,transform .85s ease .72s}
.ft{margin-top:1.3rem;font-size:.72rem;color:rgba(255,255,255,.3);transition:opacity .9s ease .92s}
#ui.on .ft{opacity:1}
.ft .h{color:#00e5ff}

.bm{background:#00e5ff;color:#020617;border:none;border-radius:999px;padding:.9rem 2.25rem;font-size:.92rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:.5rem;box-shadow:0 0 30px rgba(0,229,255,.45);transition:transform .2s,box-shadow .2s;letter-spacing:.01em}
.bm:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(0,229,255,.65)}
.bmic{width:52px;height:52px;border-radius:50%;border:1.5px solid rgba(0,229,255,.45);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:border-color .2s}
.bmic:hover{border-color:rgba(0,229,255,.85)}
.bmic::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(0,229,255,.35);animation:mpulse 2.6s ease-out infinite}
@keyframes mpulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.9);opacity:0}}
</style>
</head>
<body>

<div id="cv"></div>

<div id="eyes"><div id="eyes-inner"><div class="eye"></div><div class="eye"></div></div></div>

<div id="ui">
  <p class="u lbl">Digital Health Twin</p>
  <h1 class="u ttl"><span class="w">Meet Your<br></span><span class="c">Future Self</span></h1>
  <p class="u sub">A calm AI health twin that simulates your risks, explains your future, and helps you understand your body.</p>
  <div class="u cta">
    <button class="bm" onclick="location.href='/voice'">Talk to Your Twin →</button>
    <button class="bmic" onclick="location.href='/voice'" aria-label="Voice">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="1" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>
  <p class="ft">Your data stays <span class="h">private</span>. Always.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
(function(){
  function ss(t){t=Math.max(0,Math.min(1,t));return t*t*(3-2*t);}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

  var W=window.innerWidth,H=window.innerHeight;
  var renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(W,H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  document.getElementById('cv').appendChild(renderer.domElement);

  var scene=new THREE.Scene();
  var camera=new THREE.PerspectiveCamera(60,W/H,0.1,100);
  camera.position.z=2.5;

  // Glow sprite
  var sc=document.createElement('canvas');sc.width=sc.height=32;
  var sc2=sc.getContext('2d');
  var sg=sc2.createRadialGradient(16,16,0,16,16,16);
  sg.addColorStop(0,'rgba(0,229,255,1)');sg.addColorStop(0.4,'rgba(0,229,255,0.5)');sg.addColorStop(1,'rgba(0,229,255,0)');
  sc2.fillStyle=sg;sc2.fillRect(0,0,32,32);
  var sprite=new THREE.CanvasTexture(sc);

  // Particles
  var N=1500,ASP=W/H;
  var posArr=new Float32Array(N*3),orig=new Float32Array(N*3),ph=new Float32Array(N*4);
  for(var i=0;i<N;i++){
    var x=(Math.random()-.5)*4.5*ASP,y=(Math.random()-.5)*4.5,z=(Math.random()-.5)*0.4;
    orig[i*3]=posArr[i*3]=x;orig[i*3+1]=posArr[i*3+1]=y;orig[i*3+2]=posArr[i*3+2]=z;
    ph[i*4]=Math.random()*Math.PI*2;ph[i*4+1]=Math.random()*Math.PI*2;
    ph[i*4+2]=0.12+Math.random()*0.18;ph[i*4+3]=0.12+Math.random()*0.18;
  }
  var pGeom=new THREE.BufferGeometry();
  var posAttr=new THREE.BufferAttribute(posArr,3);
  pGeom.setAttribute('position',posAttr);
  var pMat=new THREE.PointsMaterial({map:sprite,color:0x00e5ff,size:4,sizeAttenuation:false,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending,depthWrite:false});
  scene.add(new THREE.Points(pGeom,pMat));

  // Connection lines — topology computed once
  var D2=0.20*0.20,idxA=[],idxB=[];
  for(var i=0;i<N;i++){var c=0;for(var j=i+1;j<N&&c<3;j++){var dx=orig[i*3]-orig[j*3],dy=orig[i*3+1]-orig[j*3+1];if(dx*dx+dy*dy<D2){idxA.push(i);idxB.push(j);c++;}}}
  var M=idxA.length,lineArr=new Float32Array(M*6);
  var lGeom=new THREE.BufferGeometry(),lAttr=new THREE.BufferAttribute(lineArr,3);
  lGeom.setAttribute('position',lAttr);
  var lMat=new THREE.LineBasicMaterial({color:0x00e5ff,transparent:true,opacity:0.0,blending:THREE.AdditiveBlending,depthWrite:false});
  scene.add(new THREE.LineSegments(lGeom,lMat));

  // Mouse eye parallax (no re-render cost)
  var eyesInner=document.getElementById('eyes-inner');
  document.addEventListener('mousemove',function(e){
    var ox=((e.clientX-W/2)/(W/2))*8,oy=((e.clientY-H/2)/(H/2))*6;
    eyesInner.style.transform='translate('+ox+'px,'+oy+'px)';
  });

  // Phase triggers
  setTimeout(function(){document.getElementById('eyes').classList.add('on');},5000);
  setTimeout(function(){document.getElementById('ui').classList.add('on');},9000);

  // Animate
  var clock=new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    var t=clock.getElapsedTime();
    var p2=ss(clamp((t-3)/2,0,1));   // convergence
    var p3=ss(clamp((t-5)/2.5,0,1)); // eye phase
    var p4=ss(clamp((t-7.5)/1.5,0,1)); // camera forward
    var conv=p2*0.45+p3*0.15;
    var drift=0.12-conv*0.10;
    lMat.opacity=0.07+p2*0.15;
    for(var i=0;i<N;i++){
      var bx=orig[i*3]*(1-conv),by=orig[i*3+1]*(1-conv);
      posArr[i*3]=bx+Math.sin(t*ph[i*4+2]+ph[i*4])*drift;
      posArr[i*3+1]=by+Math.cos(t*ph[i*4+3]+ph[i*4+1])*drift;
    }
    posAttr.needsUpdate=true;
    for(var k=0;k<M;k++){
      var a=idxA[k],b=idxB[k];
      lineArr[k*6]=posArr[a*3];lineArr[k*6+1]=posArr[a*3+1];lineArr[k*6+2]=0;
      lineArr[k*6+3]=posArr[b*3];lineArr[k*6+4]=posArr[b*3+1];lineArr[k*6+5]=0;
    }
    lAttr.needsUpdate=true;
    camera.position.z=(2.5-p4*0.6)+Math.sin(t*0.55)*0.018;
    renderer.render(scene,camera);
  }
  animate();

  window.addEventListener('resize',function(){
    W=window.innerWidth;H=window.innerHeight;
    camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);
  });
}());
</script>
</body>
</html>
